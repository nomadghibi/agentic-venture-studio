services:
  - type: web
    name: avs-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10.7.1 && pnpm install --frozen-lockfile && pnpm --filter @avs/types build && pnpm --filter @avs/db build && pnpm --filter @avs/agents build && pnpm --filter @avs/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_COOKIE_NAME
        value: avs_session
      - key: SESSION_TTL_DAYS
        value: 30
      - key: PASSWORD_RESET_TTL_MINUTES
        value: 60
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEB_URL
        sync: false
      - key: BETA_INVITE_CODE
        sync: false
